<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#53bdeb" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="70%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#53bdeb" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#53bdeb" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>

  <!-- Microscope silhouette -->
  <g opacity="0.15" fill="#53bdeb" transform="translate(720, 120) scale(1.2)">
    <path d="M120 40c-20 0-36 16-36 36v24h72V76c0-20-16-36-36-36z"/>
    <rect x="108" y="100" width="24" height="80" rx="4"/>
    <ellipse cx="120" cy="210" rx="55" ry="18"/>
    <rect x="70" y="235" width="100" height="12" rx="4"/>
    <circle cx="120" cy="155" r="28" fill="none" stroke="#53bdeb" stroke-width="8" opacity="0.8"/>
  </g>

  <!-- Test tubes rack -->
  <g opacity="0.12" stroke="#53bdeb" stroke-width="3" transform="translate(180, 380)">
    <rect x="0" y="80" width="200" height="8" fill="#53bdeb" stroke="none"/>
    <rect x="20" y="20" width="24" height="60" rx="8" fill="#53bdeb" fill-opacity="0.3"/>
    <rect x="60" y="10" width="24" height="70" rx="8" fill="#53bdeb" fill-opacity="0.4"/>
    <rect x="100" y="30" width="24" height="50" rx="8" fill="#53bdeb" fill-opacity="0.25"/>
    <rect x="140" y="5" width="24" height="75" rx="8" fill="#53bdeb" fill-opacity="0.35"/>
  </g>

  <!-- DNA helix -->
  <g opacity="0.1" stroke="#53bdeb" stroke-width="2" fill="none" transform="translate(900, 420)">
    <path d="M0 0 Q30 20 0 40 Q-30 60 0 80 Q30 100 0 120 Q-30 140 0 160"/>
    <path d="M40 0 Q10 20 40 40 Q70 60 40 80 Q10 100 40 120 Q70 140 40 160"/>
    <line x1="0" y1="20" x2="40" y2="20"/>
    <line x1="0" y1="60" x2="40" y2="60"/>
    <line x1="0" y1="100" x2="40" y2="100"/>
    <line x1="0" y1="140" x2="40" y2="140"/>
  </g>

  <!-- Petri dishes / cells -->
  <g opacity="0.08" fill="#53bdeb">
    <circle cx="350" cy="180" r="45"/>
    <circle cx="380" cy="200" r="30"/>
    <circle cx="320" cy="210" r="22"/>
    <circle cx="1000" cy="600" r="60"/>
    <circle cx="1040" cy="630" r="35"/>
  </g>

  <!-- Analyzer panel -->
  <g opacity="0.1" transform="translate(480, 520)">
    <rect width="280" height="160" rx="8" fill="#53bdeb" fill-opacity="0.2" stroke="#53bdeb" stroke-width="2"/>
    <rect x="20" y="20" width="80" height="50" rx="4" fill="#53bdeb" fill-opacity="0.3"/>
    <rect x="110" y="20" width="150" height="8" rx="2" fill="#53bdeb" fill-opacity="0.4"/>
    <rect x="110" y="38" width="120" height="8" rx="2" fill="#53bdeb" fill-opacity="0.3"/>
    <rect x="110" y="56" width="130" height="8" rx="2" fill="#53bdeb" fill-opacity="0.25"/>
    <rect x="20" y="90" width="240" height="50" rx="4" fill="none" stroke="#53bdeb" stroke-width="1.5"/>
    <polyline points="30,125 60,110 90,118 120,95 150,105 180,88 210,100 240,85" fill="none" stroke="#53bdeb" stroke-width="2"/>
  </g>

  <!-- Molecule nodes -->
  <g opacity="0.12" fill="#53bdeb">
    <circle cx="600" cy="120" r="8"/>
    <circle cx="650" cy="90" r="6"/>
    <circle cx="680" cy="140" r="6"/>
    <circle cx="620" cy="170" r="5"/>
    <line x1="600" y1="120" x2="650" y2="90" stroke="#53bdeb" stroke-width="1.5"/>
    <line x1="600" y1="120" x2="680" y2="140" stroke="#53bdeb" stroke-width="1.5"/>
    <line x1="600" y1="120" x2="620" y2="170" stroke="#53bdeb" stroke-width="1.5"/>
  </g>
</svg>
